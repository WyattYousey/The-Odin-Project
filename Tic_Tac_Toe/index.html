<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic-Tac-Toe</title>
        <link rel="stylesheet" href="./index.css" />
    </head>
    <body>
        <div class="bg">
            <div id="name__modal" class="game__modal">
                <div class="details__wrapper">
                    <h1 class="game__title">Tic-Tac-Toe</h1>
                    <p class="game__details_name_type">Enter Player Names!</p>
                </div>
                <form id="player_name_form">
                    <label for="player1">
                        Player 1's (X) Name:
                        <input
                            type="text"
                            name="player1"
                            id="player1"
                            value="Player 1"
                        />
                    </label>
                    <label for="player2">
                        Player 2's (O) Name:
                        <input
                            type="text"
                            name="player2"
                            id="player2"
                            value="Player 2"
                        />
                    </label>
                    <button type="submit" class="start__btn btn">Start</button>
                </form>
            </div>
            <div id="game__modal" class="game__modal hidden">
                <div class="details__wrapper">
                    <h1 class="game__title">Tic-Tac-Toe</h1>
                    <p class="game__details"></p>
                </div>
                <div class="game__board">
                    <div data-index="0" class="game__piece"></div>
                    <div data-index="1" class="game__piece"></div>
                    <div data-index="2" class="game__piece"></div>
                    <div data-index="3" class="game__piece"></div>
                    <div data-index="4" class="game__piece"></div>
                    <div data-index="5" class="game__piece"></div>
                    <div data-index="6" class="game__piece"></div>
                    <div data-index="7" class="game__piece"></div>
                    <div data-index="8" class="game__piece"></div>
                </div>
                <div class="game__controls">
                    <button class="restart__btn btn">Restart</button>
                </div>
            </div>
        </div>
        <script src="./index.js"></script>
    </body>
</html>
