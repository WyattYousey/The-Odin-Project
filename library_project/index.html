<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Library Demo</title>
        <link rel="stylesheet" href="./index.css" />
    </head>
    <body class="body">
        <div class="header__wrapper">
            <h1 class="library__title">Library Demo</h1>
            <p class="library__description">
                Click on the books below to mark them as read or unread!
            </p>
            <button class="open_modal">+Add Book</button>
        </div>
        <div class="library__wrapper"></div>
        <div class="new_book_modal closed">
            <form id="new_book_form">
                <div class="form_heading">
                    <h2 class="form__title">Add New Book</h2>
                    <button class="close_btn">Close</button>
                </div>
                <div class="form__wrapper">
                    <label for="title">
                        Title:
                        <input
                            type="text"
                            name="title"
                            id="title"
                            placeholder="Title of Book"
                        />
                    </label>
                    <label for="author">
                        Author:
                        <input
                            type="text"
                            name="author"
                            id="author"
                            placeholder="Author of Book"
                        />
                    </label>
                    <label for="pages">
                        Page Count:
                        <input
                            type="number"
                            name="pages"
                            id="pages"
                            placeholder="0"
                        />
                    </label>
                    <label for="pages">
                        Have you read this book?
                        <input type="checkbox" name="isRead" id="is_read" />
                    </label>
                    <button class="add_book_btn">Add Book</button>
                </div>
            </form>
        </div>
        <script src="./library.js"></script>
    </body>
</html>
